name: nebuleuse_app
description: Sagesse africaine moderne.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  share_plus: ^7.2.1
  http: ^1.1.0
  url_launcher: ^6.2.1
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4
  workmanager: ^0.9.0+3      # ← VERSION CORRIGÉE

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A0A0A"
  adaptive_icon_foreground: "assets/images/icon.png"